name: infra
runtime:
  name: python
description: A minimal AWS Python Pulumi program
config:
  aws:region: us-east-1    # Or your desired region
  infra:includeAgent: False
  infra:agentInstallerPath: ../../../aws-demo-ec2-agent_sh.tar.gz # Needs to be tar.gz of x86_64 SH Linux Installer
  infra:subnetId: subnet-00296c3ce08ebf532
  infra:vpcId: vpc-0183f533f910aa121
  infra:compromisedPublicKeyPath: ../../../compromised_id_rsa.pub # Will be generated by the scenario's script
  infra:attackerPublicKeyPath: ../../../attacker_id_rsa.pub  # Will be generated by the scenario's script
  infra:tags:
    value: |
      {
        "Owner": "Osher",
        "UC-OWNER": "Osher",
        "Team": "Sparrow",
        "Project": "Cobra"
      }
  pulumi:tags:
    value:
      pulumi:template: ""
