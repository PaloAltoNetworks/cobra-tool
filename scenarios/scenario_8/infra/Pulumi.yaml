name: infra
runtime:
  name: python
description: A minimal AWS Python Pulumi program
config:
  # Your desired region
  aws:region: us-east-1
  # Additional region in order to simulate multi-region activity
  infra:extraRegion: us-west-1

  # Whether to include the agent machine in the scenario
  infra:includeAgent: True
  infra:agentInstallerPath: ../../../cobra-8-agent-ec2_sh.tar.gz # Needs to be tar.gz of x86_64 SH Linux Installer

  # Prefix for created IAM user names (dev user, backdoor user, etc.)
  infra:userPrefix: "TEST"

  # Number of S3 buckets to create for exfiltration
  # infra:exfilBucketCount: 16

  # Set the appropriate vpc & subnet if needed
  # infra:subnetId: subnet-00296c3ce08ebf532
  # infra:vpcId: vpc-0183f533f910aa121

  # Path to the public keys that will be generated by the script
  infra:compromisedPublicKeyPath: ../../../compromised_id_rsa.pub
  infra:attackerPublicKeyPath: ../../../attacker_id_rsa.pub

  # Resources tags
  infra:tags:
    value: |
      {
        "Owner": "Osher",
        "UC-OWNER": "Osher",
        "Team": "Sparrow",
        "Project": "Cobra"
      }

  pulumi:tags:
    value:
      pulumi:template: ""
